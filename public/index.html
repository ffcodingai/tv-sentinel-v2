<!DOCTYPE html>
<html lang="zh-Hant">

<title>рҹӨ– е“Ёе…өжҢҮжҸ®дёӯеҝғ</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a4a;--gold:#f7971e;--gl:#ffd200;--green:#00b09b;--gcl:#96c93d;--red:#e52d27;--rcl:#ff6b6b;--blue:#4facfe;--bl:#00f2fe;--text:#e0e0e0;--dim:#888;--purple:#a855f7;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:18px;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.hs{display:flex;gap:12px;font-size:12px}.hs span{background:var(--card);padding:4px 12px;border-radius:16px;border:1px solid var(--border)}
.c{max-width:1500px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.btn{background:var(--card);color:var(--text);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.btn:hover{filter:brightness(1.2)}.bg{background:linear-gradient(135deg,var(--gold),#e67e22);color:#000;border:none;font-weight:600}
.tb{display:flex;background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tbb{padding:10px 20px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--dim);flex:1;text-align:center;border-bottom:2px solid transparent;transition:all .2s}
.tbb:hover{color:var(--text);background:rgba(255,255,255,.02)}
.tbb.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--bg);font-weight:600}
.tab{display:none}.tab.on{display:flex;flex-direction:column;gap:16px}
.cd{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:20px}
.cd h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.sc{background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;position:relative}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.si::before{background:var(--gold)}.sf::before{background:var(--green)}.sd::before{background:var(--blue)}.sl::before{background:var(--purple)}
.sc h3{font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sr{display:flex;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(42,42,74,.15)}
.sr .fl{color:var(--dim);min-width:90px;flex-shrink:0}
.tk{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin:1px}
.t1{background:rgba(0,176,155,.12);color:var(--gcl)}.t2{background:rgba(79,172,254,.12);color:var(--bl)}.t3{background:rgba(247,151,30,.12);color:var(--gold)}.t4{background:rgba(168,85,247,.12);color:var(--purple)}
.stb{padding:12px 20px;border-radius:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid;font-size:14px}
.stb.g{background:rgba(0,176,155,.08);border-color:var(--green)}.stb.r{background:rgba(229,45,39,.08);border-color:var(--red)}.stb.y{background:rgba(247,151,30,.08);border-color:var(--gold)}.stb.s{background:rgba(79,172,254,.08);border-color:var(--blue)}
.stb .bi{font-size:28px}
.stb .st{flex:1}
.stb .sl{font-weight:600;font-size:15px}
.stb .sd{font-size:12px;color:var(--dim)}
.flow{background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:16px}
.fg{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center}
.fs{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-width:90px;text-align:center;font-size:11px;transition:all .3s}
.fs.ok{border-color:var(--green)}.fs.wa{border-color:var(--gold)}.fs.tr{border-color:var(--red);box-shadow:0 0 8px rgba(229,45,39,.4)}.fs.fa{border-color:var(--red);opacity:.6}
.fs .i{font-size:16px}.fs .l{font-weight:600;font-size:10px}.fs .d{color:var(--dim);font-size:9px}
.ar{color:var(--dim);font-size:14px;flex-shrink:0}
.msg{padding:10px 14px;border-radius:8px;border:1px solid;margin-top:8px;font-size:12px;display:none}
.msg.s{display:flex;align-items:center;gap:8px}
.msg.r{border-color:var(--red);background:rgba(229,45,39,.1)}.msg.g{border-color:var(--green);background:rgba(0,176,155,.1)}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
th{text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);color:var(--dim);font-weight:500}
td{padding:3px 6px;border-bottom:1px solid rgba(42,42,74,.3)}.gc{color:var(--gcl)}.rc{color:var(--rcl)}.yc{color:var(--gold)}
.arch{font-size:11px;font-family:monospace;white-space:pre;line-height:1.5;overflow-x:auto;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;width:170px}
input[type=text]:focus{border-color:var(--gold)}
select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none}
select:focus{border-color:var(--gold)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Log styles */
.log-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0}
.log-bar label{font-size:12px;color:var(--dim)}
.log-count{font-size:12px;color:var(--dim)}
.log-refresh{font-size:11px;color:var(--gold)}
.log-table-wrap{max-height:70vh;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
.log-table-wrap table{font-size:11px}
.log-table-wrap th{position:sticky;top:0;background:var(--card);z-index:1}
.log-row-tt{color:var(--red)}.log-row-info{color:var(--blue)}.log-row-sc{color:var(--gold)}.log-row-tr{color:var(--gold);font-weight:600}
.log-evtdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.log-evtdot.tr{background:var(--red)}.log-evtdot.info{background:var(--blue)}.log-evtdot.sc{background:var(--gold)}

/* Rotation grid */
.rot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.rot-card{background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:14px;position:relative;transition:all .3s}
.rot-card:hover{border-color:var(--gold);box-shadow:0 0 12px rgba(247,151,30,.15)}
.rot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;background:var(--blue)}
.rot-card.judge::before{background:linear-gradient(90deg,var(--gold),var(--purple))}
.rot-card .rc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rot-card .rc-header .rc-icon{font-size:24px}
.rot-card .rc-header .rc-name{font-size:13px;font-weight:600}
.rot-card .rc-header .rc-agent{font-size:10px;color:var(--dim);font-family:monospace}
.rot-card .rc-row{font-size:11px;padding:3px 0;display:flex;gap:8px}
.rot-card .rc-row .rc-label{color:var(--dim);min-width:70px}
.rot-card .rc-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.rot-card .rc-actions button{flex:1}
.legend-info{font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0;margin-bottom:12px}.legend-toggle{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;font-size:13px;color:var(--dim)}.legend-toggle:hover{color:var(--text)}.legend-toggle .arrow{transition:transform .2s;font-size:10px}.legend-toggle.open .arrow{transform:rotate(90deg)}.legend-body{display:none;padding:0 14px 12px 14px;border-top:1px solid var(--border)}.legend-body.open{display:block}.legend-body table{font-size:11px;width:100%}.legend-body td{padding:3px 6px;vertical-align:top}.legend-body .td-label{color:var(--gold);font-weight:600;white-space:nowrap;width:60px}.legend-body .td-desc{color:var(--text)}.legend-body .td-note{color:var(--dim);font-size:10px}</style>
</head>

{ic:'рҹ””',nm:'дёҖиҮҙиЎҢжғ…иҪүжҠҳе“Ёе…ө v2',tp:'check',ep:'/api/sentinels/check',
 fn:'еүҚжҸҗ: дёҖиҮҙи¶ЁеӢўиЎҢжғ…е·ІзўәиӘҚпјҲдёҠжјІжҲ–дёӢи·Ңпјү\n\nжўқд»¶з”ұе°ҸвҶ’еӨ§жҷӮи§ёзҷј:\n  A1 рҹ“Ҡ tv-correlation жҠҳжәўеғ№ е°ҸвҶ’еӨ§\n  A2 рҹ”„ tv-turn дёҖзҙҡжқҝеЎҠжҠҳжәўеғ№ е°ҸвҶ’еӨ§\n  A3 рҹ”„ tv-turn еӣӣзҙҡжқҝеЎҠпјҲITеӯҗйЎһпјү е°ҸвҶ’еӨ§\n\nрҹҡЁ е…ЁйғЁжҲҗз«Ӣ = дёҖиҮҙиЎҢжғ…иҪүжҠҳ',
 ds:[['рҹ“Ҡ tv-correlation','global_spread_agg жҠҳжәўеғ№зӢҖж…Ӣ'],['рҹ”„ tv-turn','жқҝеЎҠ SPREAD_TREND+еӣӣзҙҡIT'],['рҹ”Ҙ tv-volume','е•Ҷе“Ғж”ҫйҮҸз•°еёё'],['рҹӣ°пёҸ tv-intel','дәӢд»¶/жҠҖиЎ“дҪҚ/з¶“жҝҹж•ёж“ҡ']],

 ds:[['рҹ“Ҡ tv-correlation','global_spread_agg ROCе·®еҖјзӢҖж…Ӣ'],['рҹ”„ tv-turn','жқҝеЎҠ SPREAD_TREND'],['рҹ”Ҙ tv-volume','е•Ҷе“Ғж”ҫйҮҸз•°еёё'],['рҹӣ°пёҸ tv-intel','дәӢд»¶/жҠҖиЎ“дҪҚ/з¶“жҝҹж•ёж“ҡ']],

{ic:'рҹ”„',nm:'жқҝеЎҠијӘеӢ•зі»зөұ',tp:'rotation',ep:'/api/sentinels/rotation-check',

 arch:'tv-rot-judgeвҶ’й ҳй ӯиіҮз”ўжҺғжҸҸвҶ’дёҖиҮҙиЎҢжғ…?вҶ’жҙҫ9е“Ёе…өвҶ’жқҝеЎҠеҸҚжҮүвҶ’рҹҢҠијӘеӢ•еҲӨе®ҡ\nй ҳй ӯиіҮз”ўж”ҫйҮҸ+жҠҖиЎ“е…ұиӯҳ = рҹҡҖдёҖиҮҙиЎҢжғ…\nз„Ўй ҳй ӯиіҮз”ў = вҸёпёҸз„ЎжҳҺйЎҜијӘеӢ•дҝЎиҷҹ'},

async function execRotation(marketId){
 let btn=event&&event.target?event.target:null;
 if(btn){btn.textContent='вҸі зҷјйҖҒдёӯ...';btn.disabled=true;}
 try{
  let r=document.getElementById('rcs_'+marketId);
  if(r)r.textContent='вҸі и«ӢжұӮдёӯ...';
  let res=await fetch(A+'/rotation/exec',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({market:marketId})
  }).then(r=>r.json());
  let msg='';
  if(res.ok){
   let m=ROTATION_MARKETS.find(x=>x.id===marketId);
   msg='вң… е·ІиЁҳйҢ„и§ёзҷј вҖ” и«ӢйҖҡзҹҘ Coordinatorпјҡ`spawn '+m.agent+'`';
   if(r)r.innerHTML='<span style="color:var(--gcl)">вң… е·Іи§ёзҷј</span>';
  }else{
   msg='вқҢ '+res.error;
   if(r)r.innerHTML='<span style="color:var(--red)">вқҢ йҢҜиӘӨ</span>';
  }
  alert(msg);
 }catch(e){
  let r=document.getElementById('rcs_'+marketId);
  if(r)r.innerHTML='<span style="color:var(--red)">вқҢ '+e.message+'</span>';
  alert('йҢҜиӘӨ: '+e.message);
 }
 if(btn){btn.textContent='в–¶ еҹ·иЎҢ';btn.disabled=false;}
}

function hktStr(isoStr){
 if(!isoStr)return{date:'--',time:'--'};
 let d=new Date(isoStr);
 if(isNaN(d.getTime()))return{date:isoStr.slice(0,10),time:isoStr.slice(11,19)};
 d=new Date(d.getTime()+8*3600000);
 let y=d.getUTCFullYear(),mo=String(d.getUTCMonth()+1).padStart(2,'0'),da=String(d.getUTCDate()).padStart(2,'0');
 let h=String(d.getUTCHours()).padStart(2,'0'),mi=String(d.getUTCMinutes()).padStart(2,'0');
 return{date:y+'-'+mo+'-'+da,time:h+':'+mi};
}

async function loadDashboard(){
 let body=document.getElementById('dashBody');
 if(!body)return;
 let ft=document.getElementById('logType');
 let lim=document.getElementById('logLimit');
 let kw=document.getElementById('logKeyword');
 let tr=document.getElementById('logTriggered');
 try{
  let type=ft?ft.value:'';
  let limit=lim?lim.value:100;
  let keyword=(kw?kw.value:'').trim().toLowerCase();
  let triggered=tr?tr.value:'';
  let url=A+'/executions?limit='+limit;
  if(type)url+='&type='+type;
  let data=await fetch(url).then(r=>r.json());
  if(!Array.isArray(data)){body.innerHTML='<tr><td colspan="6" style="color:var(--red)">ијүе…ҘеӨұж•—</td></tr>';return;}

  // Keyword filter
  if(keyword) data=data.filter(d=>{
   let s=(d.summary||'').toLowerCase();
   let t=(d.sentinel_type||'').toLowerCase();
   let src=(d.source||'').toLowerCase();
   return s.includes(keyword)||t.includes(keyword)||src.includes(keyword);
  });

  // Triggered filter
  if(triggered==='yes') data=data.filter(d=>d.triggered);
  if(triggered==='no') data=data.filter(d=>!d.triggered);

  // Summary cards
  let types={};
  data.forEach(d=>{let t=d.sentinel_type;if(!types[t])types[t]={total:0,triggered:0,last:null};types[t].total++;if(d.triggered)types[t].triggered++;types[t].last=d.timestamp;});
  let cards=document.getElementById('dashCards');
  if(cards){
   let icons={check:'рҹ””',trend:'рҹ“Ҳ',slow:'рҹ”„',sm:'вҡҷпёҸ',rotation:'рҹ”„'};
   let labels={check:'иҪүжҠҳе“Ёе…ө',trend:'и¶ЁеӢўз®ЎзҗҶ',slow:'ж…ўиҪүжҠҳ',sm:'trend state',rotation:'жқҝеЎҠијӘеӢ•'};
   cards.innerHTML=Object.entries(types).map(([t,v])=>
    '<div class="cd" style="text-align:center;padding:16px">'+
    '<div style="font-size:32px;margin-bottom:8px">'+(icons[t]||'рҹ”ө')+'</div>'+
    '<div style="font-size:14px;font-weight:600">'+(labels[t]||t)+'</div>'+
    '<div style="display:flex;justify-content:center;gap:20px;margin:12px 0">'+
    '<div><div style="font-size:22px;font-weight:700;color:var(--gcl)">'+v.total+'</div><div style="font-size:11px;color:var(--dim)">еҹ·иЎҢж¬Ўж•ё</div></div>'+
    '<div><div style="font-size:22px;font-weight:700;color:'+(v.triggered>0?'var(--red)':'var(--dim)')+'">'+v.triggered+'</div><div style="font-size:11px;color:var(--dim)">и§ёзҷј</div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--dim)">жңҖиҝ‘: '+(v.last?hktStr(v.last).time+' '+hktStr(v.last).date:'--')+'</div>'+
    '</div>'
   ).join('');
  }

  // Table
  let icons={check:'рҹ””',trend:'рҹ“Ҳ',slow:'рҹ”„',sm:'вҡҷпёҸ',rotation:'рҹ”„'};
  let h='';
  data.forEach(d=>{
   
   let trigIcon=d.triggered?'рҹ”ҙ жҳҜ':'вң… еҗҰ';
   let typeIcon=icons[d.sentinel_type]||'рҹ”ө';
   let smLabel = d.sentinel_type === 'sm' ? 'trend state' : (d.sentinel_type||'');
   let hkt=hktStr(d.timestamp);
   let date=hkt.date,ts=hkt.time;
   h+='<tr>'+
    '<td style="white-space:nowrap;font-size:10px">'+date+'<br>'+ts+'</td>'+
    '<td style="white-space:nowrap">'+typeIcon+' '+smLabel+'</td>'+
    '<td>'+(d.source||'')+'</td>'+
    '<td style="text-align:center;font-weight:600">'+trigIcon+'</td>'+
    '<td style="text-align:center;font-size:11px;font-weight:600;color:var(--gold)">'+(d.signal||'')+'</td>'+
    '<td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;font-size:11px">'+(d.summary||'').substring(0,150)+'</td>'+
    '<td style="font-size:10px;color:var(--dim);max-width:200px;overflow:hidden">'+(d.sources||'')+'</td>'+
   '</tr>';
  });
  body.innerHTML=h||'<tr><td colspan="6" style="color:var(--dim)">жҡ«з„ЎзҙҖйҢ„</td></tr>';

  var st2=document.getElementById('dashStatus');if(st2)st2.textContent='';
  var cnt=document.getElementById('logCount');
  if(cnt)cnt.textContent='е…ұ '+data.length+' зӯҶ';
 }catch(e){
  let st=document.getElementById('dashStatus');
 if(st)st.textContent='вқҢ ијүе…ҘеӨұж•—: '+e.message;
 body.innerHTML='<tr><td colspan="6" style="color:var(--red)">вқҢ и«ӢйҮҚж–°ж•ҙзҗҶ</td></tr>';
 }
}
